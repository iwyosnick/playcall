steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/playcall:$COMMIT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/playcall:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'playcall'  # Service name - matches your repository
      - '--image=gcr.io/$PROJECT_ID/playcall:$COMMIT_SHA'
      - '--region'
      - 'us-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'  # Match the port in your Dockerfile
      - '--memory=256Mi'  # Reduced memory for static app
      - '--cpu=1'  # Keep CPU at 1
      - '--max-instances=5'  # Reduced max instances
      - '--timeout=300'  # Set request timeout
      - '--concurrency=80'  # Set concurrency limit

options:
  logging: CLOUD_LOGGING_ONLY
